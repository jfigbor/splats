<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Avistamiento 3DGS - Aves</title>
    <!-- Cargamos la versión del motor oficial de PlayCanvas -->
    <script src="https://playcanvas.com"></script>
    <style>
        body, html { margin: 0; padding: 0; background-color: #000000; overflow: hidden; height: 100%; width: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; background-color: #000000; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: sans-serif; color: #ffffff; font-size: 1.1rem; pointer-events: none;
            background: rgba(15, 15, 15, 0.9); padding: 20px 30px; border-radius: 6px; 
            z-index: 10; border: 1px solid #222; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Cargando relieve del ave...</div>
    <canvas id="application-canvas"></canvas>

    <script>
        // 1. RESOLVER PARÁMETROS DE URL
        const urlParams = new URLSearchParams(window.location.search);
        let rutaModelo = urlParams.get('ruta');
        
        if (!rutaModelo) {
            document.getElementById("loading").innerText = "Falta el parámetro '?ruta=' en la URL";
            throw new Error("Parámetro ausente");
        }

        // Si se pasa una URL de la interfaz web de GitHub por error, la corregimos a datos en bruto
        if (rutaModelo.includes("github.com") && rutaModelo.includes("/tree/")) {
            rutaModelo = rutaModelo.replace("github.com", "://githubusercontent.com").replace("/tree/", "/");
        }

        // Construir URL absoluta apuntando a tu servidor de GitHub Pages
        const urlDelModelo = rutaModelo.startsWith('http') 
            ? rutaModelo 
            : window.location.origin + window.location.pathname.replace('index.html', '') + rutaModelo;

        // 2. INICIALIZAR MOTOR PLAYCANVAS
        const canvas = document.getElementById("application-canvas");
        const app = new pc.Application(canvas, {
            mouse: new pc.Mouse(document.body),
            touch: new pc.TouchDevice(document.body)
        });
        app.start();
        app.setCanvasResolution(pc.RESOLUTION_AUTO);
        window.addEventListener('resize', () => app.resizeCanvas());

        app.scene.toneMapping = pc.TONEMAP_ACES;

        // 3. CONFIGURAR LA CÁMARA (Fondo Negro Puro)
        const camera = new pc.Entity('camera');
        camera.addComponent('camera', { 
            clearColor: new pc.Color(0, 0, 0, 1),
            farClip: 100,
            nearClip: 0.01
        });
        camera.translate(0, 0, 1.5); // Distancia prudencial de renderizado inicial
        app.root.addChild(camera);

        // Controles de Rotación y Órbita
        let isDragging = false;
        let lastX, lastY;
        let rotX = 0, rotY = 180;

        const startDrag = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const moveDrag = (x, y) => {
            if (!isDragging) return;
            let dx = x - lastX;
            let dy = y - lastY;
            rotY += dx * 0.4;
            rotX += dy * 0.4;
            const ave = app.root.findByName('Ave3D');
            if (ave) ave.setLocalEulerAngles(rotX, rotY, 0);
            lastX = x; lastY = y;
        };

        window.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));

        if (app.touch) {
            window.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches.clientX, e.touches.clientY); });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => { if(e.touches.length === 1) moveDrag(e.touches.clientX, e.touches.clientY); });
        }

        // 4. DESCARGA INMUNE (Carga el archivo como binario en bruto para saltar restricciones MIME)
        app.assets.loadFromUrl(urlDelModelo, "binary", function (err, asset) {
            if (err) {
                console.error("Error crítico de descarga:", err);
                document.getElementById("loading").innerText = "Error: Archivo no encontrado o bloqueo de servidor.";
                return;
            }

            // Forzar la conversión del recurso descargado a la estructura de tipo "gsplat"
            asset.type = "gsplat";
            
            // Forzar al motor a compilar el búfer binario en datos de nube de puntos
            app.assets.load(asset);

            asset.ready(function (loadedAsset) {
                // Ocultar mensaje de carga
                document.getElementById("loading").style.display = "none";
                
                // Instanciar la entidad e inyectar el recurso procesado en memoria
                const aveEntity = new pc.Entity('Ave3D');
                aveEntity.addComponent('gsplat', { 
                    asset: loadedAsset.resource || loadedAsset
                });
                
                aveEntity.setLocalPosition(0, 0, 0);
                aveEntity.setLocalEulerAngles(rotX, rotY, 0); 
                app.root.addChild(aveEntity);
            });
        });
    </script>
</body>
</html>
