<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Avistamiento 3DGS - Aves</title>
    <!-- Cargamos la versión estable del motor de PlayCanvas -->
    <script src="https://playcanvas.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: sans-serif; color: #fff; font-size: 1.1rem; pointer-events: none;
            background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 8px; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loading">Descargando y procesando relieve del ave (Gaussian Splat)...</div>
    <canvas id="application-canvas"></canvas>

    <script>
        // 1. OBTENER PARÁMETROS DE LA URL
        const urlParams = new URLSearchParams(window.location.search);
        const rutaModelo = urlParams.get('ruta');
        
        if (!rutaModelo) {
            document.getElementById("loading").innerText = "Error: Falta el parámetro '?ruta='";
            throw new Error("Parámetro 'ruta' ausente.");
        }

        // Construir la URL absoluta apuntando a tu GitHub Pages
        const urlDelModelo = window.location.origin + window.location.pathname.replace('index.html', '') + rutaModelo;

        // 2. INICIALIZAR PLAYCANVAS
        const canvas = document.getElementById("application-canvas");
        const app = new pc.Application(canvas, {
            mouse: new pc.Mouse(document.body),
            touch: new pc.TouchDevice(document.body)
        });
        app.start();
        app.setCanvasResolution(pc.RESOLUTION_AUTO);
        window.addEventListener('resize', () => app.resizeCanvas());

        app.scene.toneMapping = pc.TONEMAP_ACES;

        // 3. CONFIGURAR LA CÁMARA
        const camera = new pc.Entity('camera');
        camera.addComponent('camera', { 
            clearColor: new pc.Color(0.1, 0.1, 0.1, 1.0),
            farClip: 100,
            nearClip: 0.01
        });
        camera.translate(0, 0, 1.5); // Alejamos la cámara un poco más por si el ave es grande
        app.root.addChild(camera);

        // 4. INTERACCIÓN DE ROTACIÓN (Mejorada para orbitar alrededor del centro)
        let isDragging = false;
        let lastX, lastY;
        let rotX = 0, rotY = 180; // Iniciar mirando al frente

        window.addEventListener('mousedown', (e) => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            let dx = e.clientX - lastX;
            let dy = e.clientY - lastY;
            
            rotY += dx * 0.4;
            rotX += dy * 0.4;

            const ave = app.root.findByName('Ave3D');
            if (ave) {
                ave.setLocalEulerAngles(rotX, rotY, 0);
            }

            lastX = e.clientX; 
            lastY = e.clientY;
        });

        // Soporte para pantallas táctiles (Celulares)
        if (app.touch) {
            window.addEventListener('touchstart', (e) => { if(e.touches.length === 1){ isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; } });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                let dx = e.touches[0].clientX - lastX;
                let dy = e.touches[0].clientY - lastY;
                rotY += dx * 0.4; rotX += dy * 0.4;
                const ave = app.root.findByName('Ave3D');
                if (ave) ave.setLocalEulerAngles(rotX, rotY, 0);
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            });
        }

        // 5. CARGA DINÁMICA DEL ARCHIVO .SPLAT
        app.assets.loadFromUrl(urlDelModelo, "gsplat", function (err, asset) {
            if (err) {
                console.error("Error en carga:", err);
                document.getElementById("loading").innerText = "Error: No se pudo leer el archivo .splat";
                return;
            }

            // Ocultar mensaje de carga
            document.getElementById("loading").style.display = "none";
            
            // Crear entidad del modelo
            const aveEntity = new pc.Entity('Ave3D');
            
            // CORRECCIÓN CRUCIAL: Asignar la propiedad .resource del asset procesado
            aveEntity.addComponent('gsplat', { 
                asset: asset.resource 
            });
            
            // Centrar y orientar por defecto
            aveEntity.setLocalPosition(0, 0, 0);
            aveEntity.setLocalEulerAngles(rotX, rotY, 0); 
            
            app.root.addChild(aveEntity);
        });
    </script>
</body>
</html>
