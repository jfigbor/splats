<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Avistamiento 3DGS - Aves</title>
    <!-- Usamos el motor oficial estable de PlayCanvas -->
    <script src="https://playcanvas.com"></script>
    <style>
        /* FONDO NEGRO ABSOLUTO */
        body, html { margin: 0; padding: 0; background-color: #000000; overflow: hidden; height: 100%; width: 100%; }
        canvas { display: block; width: 100vw; height: 100vh; background-color: #000000; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: sans-serif; color: #ffffff; font-size: 1.1rem; pointer-events: none;
            background: rgba(20, 20, 20, 0.85); padding: 18px 30px; border-radius: 6px; 
            z-index: 10; border: 1px solid #333; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Cargando relieve del ave...</div>
    <canvas id="application-canvas"></canvas>

    <script>
        // 1. CAPTURA PARÁMETROS Y SOLUCIÓN DE ENLACES EXTERNOS
        const urlParams = new URLSearchParams(window.location.search);
        let rutaModelo = urlParams.get('ruta');
        
        if (!rutaModelo) {
            document.getElementById("loading").innerText = "Falta el parámetro '?ruta=' en la URL";
            throw new Error("Falta parámetro");
        }

        // Corrección de rutas raw de GitHub si el usuario pega enlaces de repositorio en lugar de páginas compiladas
        if (rutaModelo.includes("github.com") && rutaModelo.includes("/tree/")) {
            rutaModelo = rutaModelo.replace("github.com", "://githubusercontent.com").replace("/tree/", "/");
        }

        // Construir la URL final absoluta libre de errores de ámbito
        const urlDelModelo = rutaModelo.startsWith('http') 
            ? rutaModelo 
            : window.location.origin + window.location.pathname.replace('index.html', '') + rutaModelo;

        // 2. INICIALIZACIÓN DEL MOTOR PLAYCANVAS
        const canvas = document.getElementById("application-canvas");
        const app = new pc.Application(canvas, {
            mouse: new pc.Mouse(document.body),
            touch: new pc.TouchDevice(document.body)
        });
        app.start();
        app.setCanvasResolution(pc.RESOLUTION_AUTO);
        window.addEventListener('resize', () => app.resizeCanvas());

        app.scene.toneMapping = pc.TONEMAP_ACES;

        // 3. CONFIGURAR LA CÁMARA (Mirando sobre el fondo negro)
        const camera = new pc.Entity('camera');
        camera.addComponent('camera', { 
            clearColor: new pc.Color(0, 0, 0, 1), // Negro absoluto nativo del lienzo
            farClip: 100,
            nearClip: 0.01
        });
        camera.translate(0, 0, 1.2); 
        app.root.addChild(camera);

        // Sistema de Órbita y Arrastre del Ave
        let isDragging = false;
        let lastX, lastY;
        let rotX = 0, rotY = 180;

        const startDrag = (x, y) => { isDragging = true; lastX = x; lastY = y; };
        const moveDrag = (x, y) => {
            if (!isDragging) return;
            let dx = x - lastX;
            let dy = y - lastY;
            rotY += dx * 0.4;
            rotX += dy * 0.4;
            const ave = app.root.findByName('Ave3D');
            if (ave) ave.setLocalEulerAngles(rotX, rotY, 0);
            lastX = x; lastY = y;
        };

        window.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));

        if (app.touch) {
            window.addEventListener('touchstart', (e) => { if(e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY); });
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('touchmove', (e) => { if(e.touches.length === 1) moveDrag(e.touches[0].clientX, e.touches[0].clientY); });
        }

        // 4. CARGAR RECURSO MEDIANTE EL CONTENEDOR DE CONTENIDO (MÉTODO SEGURO)
        app.assets.loadFromUrl(urlDelModelo, "gsplat", function (err, asset) {
            if (err) {
                console.error("Fallo de red o CORS:", err);
                document.getElementById("loading").innerText = "Error al descargar el archivo .splat (Verifica CORS o la ruta)";
                return;
            }

            // Desvanecer capa de carga
            document.getElementById("loading").style.display = "none";
            
            // Instanciar el objeto 3D ligando la estructura de memoria nativa
            const aveEntity = new pc.Entity('Ave3D');
            aveEntity.addComponent('gsplat', { 
                asset: asset.resource || asset
            });
            
            aveEntity.setLocalPosition(0, 0, 0);
            aveEntity.setLocalEulerAngles(rotX, rotY, 0); 
            app.root.addChild(aveEntity);
        });
    </script>
</body>
</html>
